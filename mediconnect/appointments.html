<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Appointments - MediConnect</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body id="appointment-body">
    <nav id="appointments-nav">
      <a class="nav-link" href="homepage.html">Home</a>
      <a class="nav-link" href="appointments.html">Appointments</a>
      <a class="nav-link" href="aboutus.html">About</a>
      <a class="nav-link" href="contact.html">Contact</a>
      <a class="nav-link" href="signin.html">Sign In</a>
      <a class="nav-link" href="signup.html">Sign Up</a>
    </nav>

    <header id="appointments-header">
      <h1 class="appointments-title">BOOK YOUR APPOINTMENT NOW!</h1>
    </header>

    <main id="appointments-main">
      <form id="appointment-form" novalidate>
        <div class="form-group">
          <label for="fullname">Full Name:</label>
          <input id="fullname" class="input-text" type="text" name="fullname" placeholder="Enter your full name" required>
        </div>

        <div class="form-group">
          <label for="phone">Phone Number:</label>
          <!-- Changed type from "number" to "tel" — "number" is semantically wrong for phone numbers -->
          <input id="phone" class="input-text" type="tel" name="phone" placeholder="Enter phone number" required>
        </div>

        <div class="form-group">
          <label for="email">Email Address:</label>
          <input id="email" class="input-text" type="email" name="email" placeholder="Enter email address" required>
        </div>

        <div class="form-group">
          <label for="gender">Gender:</label>
          <select id="gender" name="gender" class="select-field" required>
            <option value="">Choose gender</option>
            <option value="male">Male</option>
            <option value="female">Female</option>
            <option value="other">Other</option>
          </select>
        </div>

        <div class="form-group">
          <label for="language">Language Preference:</label>
          <select id="language" name="language" class="select-field" required>
            <option value="">-- Please Select --</option>
            <option value="english">English</option>
            <option value="kiswahili">Kiswahili</option>
            <option value="other">Other</option>
          </select>
        </div>

        <div class="form-group">
          <label for="address">Address:</label>
          <input id="address" class="input-text" type="text" name="address" placeholder="Enter address" required>
        </div>

        <div class="form-group">
          <label for="county">County of Residence:</label>
          <select id="county" name="county" class="select-field" required>
            <option value="">-- Please Select --</option>
            <option value="kiambu">Kiambu</option>
            <option value="nairobi">Nairobi</option>
            <option value="nakuru">Nakuru</option>
            <option value="other">Other</option>
          </select>
        </div>

        <div class="form-group">
          <label for="appointment-date">Preferred Date of Appointment:</label>
          <input id="appointment-date" class="input-text" type="date" name="appointment_date" required>
        </div>

        <div class="form-group">
          <label for="department">Medical Department:</label>
          <select id="department" name="department" class="select-field" required>
            <option value="">-- Please Select --</option>
            <option value="cardiology">Cardiology</option>
            <option value="dermatology">Dermatology</option>
            <option value="pediatrics">Pediatrics</option>
            <option value="other">Other</option>
          </select>
        </div>

        <div class="form-group">
          <label for="symptoms">Describe Your Symptoms:</label>
          <textarea id="symptoms" class="textarea" name="symptoms" placeholder="Describe your symptoms" required></textarea>
        </div>

        <fieldset class="form-group services-fieldset">
          <legend>Additional Services</legend>
          <div class="checkbox-group">
            <input id="connect-doctor" type="checkbox" name="connect_doctor" value="connect-doctor">
            <label for="connect-doctor">Connect with a doctor — Ksh. 1,800</label>
          </div>
          <div class="checkbox-group">
            <input id="house-call" type="checkbox" name="house_call" value="house-call">
            <label for="house-call">House-call (Doctor comes to your place) — Ksh. 2,500</label>
          </div>
        </fieldset>

        <div class="form-group">
          <button id="submit-button" type="submit">Submit Details</button>
        </div>

        <div class="form-auth-links">
          <a class="auth-inline-link" href="signin.html">Sign In</a>
          <a class="auth-inline-link" href="signup.html">Sign Up</a>
        </div>

        <div class="form-image">
          <img class="appointment-image" src="images/pexels-artempodrez-6823608.jpg" alt="Doctor appointment" width="80%">
        </div>
      </form>
    </main>

    <footer id="appointments-footer">
      &copy; 2025 MEDICONNECT. All rights reserved.
    </footer>
  </body>
</html>
