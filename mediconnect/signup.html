<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign Up - MediConnect</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body id="signup-page-body">
    <nav id="signup-page-nav">
      <a class="nav-link" href="homepage.html">Home</a>
      <a class="nav-link" href="appointments.html">Appointments</a>
      <a class="nav-link" href="aboutus.html">About</a>
      <a class="nav-link" href="contact.html">Contact</a>
      <a class="nav-link" href="signin.html">Sign In</a>
      <a class="nav-link" href="signup.html">Sign Up</a>
    </nav>

    <main id="signup-page-main">
      <h2 class="auth-heading">Create a MediConnect Account</h2>
      <form class="auth-form" id="signupForm" novalidate>

        <label for="signup-name">Full Name</label>
        <input type="text" id="signup-name" name="fullname" placeholder="Enter your full name" required />
        <p id="nameError" class="error-message"></p>

        <label for="signup-email">Email Address</label>
        <input type="email" id="signup-email" name="email" placeholder="Enter your email" required />
        <p id="emailError" class="error-message"></p>

        <label for="signup-dob">Date of Birth</label>
        <input type="date" id="signup-dob" name="dob" required />
        <p id="dobError" class="error-message"></p>

        <label for="signup-country-code">Phone Number</label>
        <div class="phone-group">
          <select id="signup-country-code" name="country_code" required>
            <option value="">Code</option>
            <option value="+1">USA (+1)</option>
            <option value="+44">UK (+44)</option>
            <option value="+254" selected>Kenya (+254)</option>
            <option value="+61">Australia (+61)</option>
            <option value="+49">Germany (+49)</option>
          </select>
          <input type="tel" id="signup-phone" name="phone" placeholder="e.g. 712345678" required />
        </div>
        <p id="phoneError" class="error-message"></p>

        <label for="signup-password">Password</label>
        <input type="password" id="signup-password" name="password" placeholder="Create a password" required />
        <p id="passwordError" class="error-message"></p>

        <label for="signup-confirm-password">Confirm Password</label>
        <input type="password" id="signup-confirm-password" name="confirm_password" placeholder="Re-enter your password" required />
        <p id="confirmPasswordError" class="error-message"></p>

        <label for="signup-account-type">Account Type</label>
        <select id="signup-account-type" name="account_type" required>
          <option value="">Select Account Type</option>
          <option value="patient">Patient</option>
          <option value="doctor">Doctor</option>
          <option value="admin">Administrator</option>
        </select>
        <p id="accountTypeError" class="error-message"></p>

        <button type="submit" class="auth-button">Sign Up</button>
        <p class="auth-switch">Already have an account? <a href="signin.html">Sign In</a></p>
      </form>
    </main>

    <footer id="signup-page-footer">
      &copy; 2025 MEDICONNECT. All rights reserved.
    </footer>

    <div id="customModal" class="modal hidden">
      <div class="modal-content">
        <h3 id="modalTitle"></h3>
        <p id="modalMessage"></p>
        <button id="closeModalButton">OK</button>
      </div>
    </div>

    <script src="signup.js"></script>
  </body>
</html>
