<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign In - MediConnect</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body id="signin-page-body">
    <nav id="signin-page-nav">
      <a class="nav-link" href="homepage.html">Home</a>
      <a class="nav-link" href="appointments.html">Appointments</a>
      <a class="nav-link" href="aboutus.html">About</a>
      <a class="nav-link" href="contact.html">Contact</a>
      <a class="nav-link" href="signin.html">Sign In</a>
      <a class="nav-link" href="signup.html">Sign Up</a>
    </nav>

    <main id="signin-page-main">
      <h2 class="auth-heading">Sign In to MediConnect</h2>
      <form class="auth-form" id="signinForm" novalidate>
        <label for="signin-email">Email Address</label>
        <input type="email" id="signin-email" name="email" placeholder="Enter your email" required />
        <p id="signinEmailError" class="error-message"></p>

        <label for="signin-password">Password</label>
        <input type="password" id="signin-password" name="password" placeholder="Enter your password" required />
        <p id="signinPasswordError" class="error-message"></p>

        <button type="submit" class="auth-button">Sign In</button>
        <p class="auth-switch">Don't have an account? <a href="signup.html">Sign Up</a></p>
      </form>
    </main>

    <footer id="signin-page-footer">
      &copy; 2025 MEDICONNECT. All rights reserved.
    </footer>

    <script>
      const signinForm = document.getElementById('signinForm');
      const signinEmailError = document.getElementById('signinEmailError');
      const signinPasswordError = document.getElementById('signinPasswordError');

      signinForm.addEventListener('submit', function (event) {
        event.preventDefault();
        let valid = true;

        const email = document.getElementById('signin-email').value.trim();
        const password = document.getElementById('signin-password').value;

        if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
          signinEmailError.textContent = 'Please enter a valid email address.';
          valid = false;
        } else {
          signinEmailError.textContent = '';
        }

        if (password.length < 1) {
          signinPasswordError.textContent = 'Please enter your password.';
          valid = false;
        } else {
          signinPasswordError.textContent = '';
        }

        if (valid) {
          // Placeholder: submit to backend
          alert('Sign-in successful! (Backend integration pending)');
          signinForm.reset();
        }
      });
    </script>
  </body>
</html>
